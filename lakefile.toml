name = "zisk-fv"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["ZiskFv"]
moreLeanArgs = ["--tstack=400000"]

[leanOptions]
pp.unicode.fun = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

# Sail-Lean RV64D spec is built locally from primary source via
# the Nix flake (`nix run .#populate`). Lake reads from the local
# build/sail-lean/ tree â€” the spec is NOT pulled pre-built. Run
# `nix run .#populate` once before `lake build`. See nix/README.md.
[[require]]
name = "LeanRV"
path = "build/sail-lean"

# Auto-generated PIL2 extraction (per-AIR Lean files emitted by
# `tools/pil-extract` from `build/zisk.pilout`). Populated by
# `nix run .#populate` â€” never committed. These files use a generated
# `Extraction.Circuit` shim and are checked directly by the top-level test
# gate where needed, but they remain outside the main Lake dependency graph.
# Re-introducing them as library dependencies requires re-extracting against
# a Clean-Components-aware emitter.

# Clean DSL (Verified-zkEVM/clean) source tree. Populated by
# `nix run .#populate` from the pinned `clean-src` flake input.
# Mathlib v4.28.0 is shared (Clean and zisk-fv pin the same rev).
[[require]]
name = "Clean"
path = "build/clean-lean"

# Patched, prebuilt v4.28.0 Aeneas runtime (eth-act/zisk-fv#111). Populated by
# `nix run .#populate` (toolchain-sync step, depends on eth-act/zisk-fv#158);
# the `build/aeneas-lean` symlink is gitignored. Reuses the worktree's mathlib
# (same rev 8f9d9cff). Used by the `ProductionM2` lean_lib (the real Aeneas-
# extracted ZisK lowerer) and the in-build static-pin discharge under
# ZiskFv/Compliance/AeneasBridgeTrust/.
[[require]]
name = "aeneas"
path = "build/aeneas-lean"

[[require]]
name = "repl"
git = "https://github.com/leanprover-community/repl"
rev = "v4.28.0"

[[lean_lib]]
name = "ZiskFv"

# The REAL Aeneas-extracted ZisK lowerer (`trust/aeneas/ProductionM2.lean`,
# `import Aeneas`). Imported by ZiskFv/Compliance/AeneasBridgeTrust/Extraction.lean
# to discharge per-opcode static decode/row-mode pins kernel-soundly.
[[lean_lib]]
name = "ProductionM2"
srcDir = "trust/aeneas"

# V2 trust gate: a Lake exe that consumes oleans, walks elaborated theorem
# types via `forallTelescope` + reducible-transparency unfolding, and emits
# a per-theorem axiom-closure baseline via `Lean.collectAxioms`. Run via
# `lake exe trust-gate <subcommand>` after `lake build`.
#
# Library half: holds the TrustGate.* metaprogramming modules so Lake
# knows to build them as oleans before linking the exe.
[[lean_lib]]
name = "TrustGate"
srcDir = "bin"

[[lean_exe]]
name = "trust-gate"
srcDir = "bin"
root = "TrustGate.Main"
supportInterpreter = true
