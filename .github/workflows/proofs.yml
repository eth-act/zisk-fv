name: proofs

# Build the proofs from scratch and run the full test suite (cargo +
# lake + trust gate + nix flake check). A green run is the formal-
# verification claim that every per-opcode equivalence theorem
# typechecks against the pinned upstream artifacts.
#
# Cost: ~30 min cold (no Nix store cache), ~5 min warm. flake.lock
# pins every build input (sail/sail-riscv/zisk/pil2-* sources +
# nixpkgs rev) by content hash, so the same build runs across machines.

on:
  push:
    branches: [main]
    paths:
      - 'ZiskFv/**'
      - 'bin/TrustGate/**'
      - 'tools/pil-extract/**'
      - 'scripts/aeneas-production-extract.sh'
      - 'zisk'
      - 'zisk/**'
      - 'lake-manifest.json'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'trust/**'
      - '.github/workflows/proofs.yml'
  workflow_dispatch:

concurrency:
  group: proofs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pick-runner:
    name: probe cachix and select runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve pilout derivation output hash
        id: eval
        run: |
          set -euo pipefail
          path=$(nix eval --raw .#zisk-pilout.outPath)
          name=${path##*/}
          hash=${name%%-*}
          echo "path=$path"
          echo "hash=$hash"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Probe zisk-fv.cachix.org for pilout
        id: pick
        run: |
          set -uo pipefail
          hash="${{ steps.eval.outputs.hash }}"
          status=$(curl -sIo /dev/null -w "%{http_code}" \
            "https://zisk-fv.cachix.org/${hash}.narinfo" || echo "000")
          echo "narinfo HTTP $status for $hash"
          if [ "$status" = "200" ]; then
            echo "pilout cached; routing to size-l-x64"
            echo "runner=size-l-x64" >> "$GITHUB_OUTPUT"
          else
            echo "pilout NOT cached; routing to size-xl-x64 for cold build"
            echo "runner=size-xl-x64" >> "$GITHUB_OUTPUT"
          fi

  aeneas-extraction-diff:
    name: Aeneas extraction diff
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # ubuntu-latest ships ~14 GiB free on /. The Aeneas regeneration's Nix
      # closure (charon, rust-std, rustc-dev, OCaml) overflowed it ("No space
      # left on device", run 27665019733). Reclaim the preinstalled toolchains
      # we don't use before any Nix store writes.
      - name: Free disk space
        run: |
          echo "before:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/share/boost || true
          sudo docker image prune --all --force || true
          echo "after:"; df -h /

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Pull prebuilt charon / rust-std / rustc-dev from zisk-fv.cachix.org
      # instead of compiling them from source — the source build is what
      # exhausted the runner disk. (The other Aeneas jobs already do this.)
      - uses: cachix/cachix-action@v15
        with:
          name: zisk-fv
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Regenerate and diff ProductionM2.lean
        run: nix run .#aeneas-production-extract-check-tracked

  lake-build:
    name: lake build (full FV check)
    needs: pick-runner
    # Cached `nix populate` runs target the 16 GiB L runner again. The
    # successful 2026-06-02 main run after the sd proof-memory fix peaked
    # at 10.5 GiB kernel used memory with LEAN_NUM_THREADS=4. Cold pilout
    # cache misses still route to the 32 GiB XL runner.
    runs-on: ["self-hosted-ghr", "${{ needs.pick-runner.outputs.runner }}"]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          # Production-backed extraction checks depend on zisk/{riscv,core}
          # as path dependencies. The formal build inputs still come from
          # flake.lock; this checkout is only for the differential pin.
          submodules: true

      # cachix/install-nix-action (rather than DeterminateSystems') —
      # cachix-action assumes paths set up by this installer; using
      # the DS installer breaks `which cachix` lookup post-install.
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # ----------------------------------------------------------------
      # Cachix binary cache for Nix derivations. After the first run
      # populates the cache (or you `cachix push zisk-fv` locally),
      # subsequent runs pull pre-built `sail-lean-tree` /
      # `zisk-pilout` / `extracted-lean` outputs in seconds instead
      # of the ~30 min cold build. Public read; authenticated push.
      # ----------------------------------------------------------------
      - uses: cachix/cachix-action@v15
        with:
          name: zisk-fv
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # ----------------------------------------------------------------
      # Cache .lake (Mathlib + project build). Mathlib oleans come from
      # mathlib's azure cache via `lake exe cache get`; we persist the
      # full .lake/ across runs to avoid the ~10-minute cold compile.
      # ----------------------------------------------------------------
      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lake-manifest.json', 'lakefile.toml', 'lean-toolchain') }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            lake-${{ hashFiles('lake-manifest.json', 'lakefile.toml', 'lean-toolchain') }}-

      # ----------------------------------------------------------------
      # The actual build. `nix run .#populate` builds the three Nix
      # derivations (sail-lean-tree, zisk-pilout, extracted-lean) in
      # parallel and copies their outputs into build/ + ZiskFv/Extraction/.
      # ----------------------------------------------------------------
      - name: Populate build/ + ZiskFv/Extraction/ from flake
        run: nix run .#populate

      - name: Pull mathlib oleans
        run: nix develop --command bash -c 'lake exe cache get || true'

      - name: nix run .#test (cargo + lake + trust gate + flake check)
        env:
          # threads=4 in CI. Run 26850299478's mem-trace (2026-06-02,
          # warm cache, main) measured peak kernel `used` = 10.5 GiB.
          # That fits the 16 GiB L runner with headroom after the sd
          # proof-memory fix, and matches nix/test.nix's default.
          LEAN_NUM_THREADS: "4"
          # The independent Aeneas production-extraction completeness check
          # (step 3/8) is the single largest cost (~1.5h) and is unrelated to
          # the Lake proof graph. Run it in the parallel
          # aeneas-production-extraction job below instead of serializing it
          # ahead of `lake build`. Plain local `nix run .#test` is unaffected.
          ZISK_FV_TEST_SKIP_AENEAS: "1"
        run: |
          # Memory + lean-process sidecar. Run 25230110804 died with no
          # step log content preserved → strong signal the runner host
          # itself crashed (probably kernel OOM-kill of the runner agent
          # rather than just lake's lean subprocesses). This sidecar
          # streams to stdout every 10s so GitHub captures real-time
          # samples even if the agent dies later, and persists to a
          # file uploaded as artifact for post-mortem.
          mkdir -p /tmp/proofs-debug
          TRACE=/tmp/proofs-debug/mem-trace.log
          : > "$TRACE"
          (
            while true; do
              ts=$(date -u +%H:%M:%S)
              mem=$(awk '/MemTotal/{t=$2} /MemAvailable/{a=$2} END{printf "tot=%.1fG avail=%.1fG used=%.1fG", t/1048576, a/1048576, (t-a)/1048576}' /proc/meminfo)
              leans=$(pgrep -c '^lean$' || true)
              leans=${leans:-0}
              lean_rss=$(awk '$2 == "lean" {sum += $1} END {printf "%.1fG", sum/1048576}' <(ps -eo rss,comm))
              load=$(awk '{print $1}' /proc/loadavg)
              line="[mem $ts] $mem leans=$leans lean_rss=$lean_rss load=$load"
              echo "$line"
              echo "$line" >> "$TRACE"
              sleep 10
            done
          ) &
          SIDECAR_PID=$!
          trap 'kill $SIDECAR_PID 2>/dev/null || true' EXIT
          echo "::group::env (LEAN_NUM_THREADS visibility)"
          echo "LEAN_NUM_THREADS=$LEAN_NUM_THREADS"
          nproc
          free -m
          echo "::endgroup::"
          set +e
          nix run .#test
          EXIT=$?
          set -e
          kill $SIDECAR_PID 2>/dev/null || true
          echo "::group::dmesg tail (OOM-killer evidence)"
          dmesg | tail -200 || sudo dmesg | tail -200 || echo "dmesg unavailable"
          echo "::endgroup::"
          exit $EXIT

      - name: Upload mem-trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mem-trace
          path: /tmp/proofs-debug/
          if-no-files-found: warn
          retention-days: 7

      - name: On failure — show next-step pointers
        if: failure()
        run: |
          echo "::error::FV check failed. Documentation:"
          echo "  - CLAUDE.md  (working conventions for agents)"
          echo "  - trust/README.md  (overview of the trust gate)"
          echo "  - flake.lock  (the audit surface for build-input changes)"

  # ------------------------------------------------------------------
  # Aeneas RV-completeness extraction harness, run in PARALLEL with the
  # Lake FV gate above. Previously this ran as step 3/8 of `nix run .#test`
  # inside the lake-build job, serializing ~1.5h of generated-extraction
  # work ahead of the proof build. It is independent of the Lake proof
  # graph (the `aeneas-extraction-diff` job already guards the tracked
  # ProductionM2 artifact), so it belongs off the critical path.
  #
  # The temporary `build/aeneas-production-extraction/lean-check/.lake` is
  # cached across runs: the generated completeness files are deterministic
  # given the extraction inputs, so an unchanged harness is a near no-op
  # lake build instead of recompiling ~26 RvDecode* files (~580-820s each)
  # from scratch every push.
  # ------------------------------------------------------------------
  aeneas-production-extraction:
    name: Aeneas production extraction
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      # Restoring the multi-GiB lean-check .lake cache below on top of the
      # ~14 GiB-free ubuntu-latest disk crashed the runner agent ("No space
      # left on device", run 27702413061 — a warm-cache run, where the cold
      # merge run had passed). Reclaim unused preinstalled toolchains first.
      - name: Free disk space
        run: |
          echo "before:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/share/boost || true
          sudo docker image prune --all --force || true
          echo "after:"; df -h /

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: zisk-fv
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache Aeneas lean-check .lake
        uses: actions/cache@v4
        with:
          path: build/aeneas-production-extraction/lean-check/.lake
          key: aeneas-lean-check-${{ runner.os }}-${{ hashFiles('flake.lock', 'lean-toolchain', 'scripts/aeneas-production-extract.sh', 'zisk/core/src/aeneas_extract.rs', 'ZiskFv/Compliance/RowProvenance.lean', 'trust/aeneas/ProductionM2.lean') }}
          restore-keys: |
            aeneas-lean-check-${{ runner.os }}-

      - name: Run full Aeneas production extraction completeness check
        env:
          AENEAS_CHECK_RV_COMPLETENESS: "1"
          LEAN_NUM_THREADS: "4"
        run: nix run .#aeneas-production-extract

      - name: On failure — show next-step pointers
        if: failure()
        run: |
          echo "::error::Aeneas production extraction failed. Documentation:"
          echo "  - scripts/aeneas-production-extract.sh"
          echo "  - trust/aeneas/README.md"
          echo "  - flake.lock  (the audit surface for Aeneas/build-input changes)"
