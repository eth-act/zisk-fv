name: proofs

# Build the proofs from scratch and run the full test suite (cargo +
# lake + trust gate + nix flake check). A green run is the formal-
# verification claim that every per-opcode equivalence theorem
# typechecks against the pinned upstream artifacts.
#
# Cost: ~30 min cold (no Nix store cache), ~5 min warm. flake.lock
# pins every build input (sail/sail-riscv/zisk/pil2-* sources +
# nixpkgs rev) by content hash, so the same build runs across machines.

on:
  # On PRs the workflow is opt-in: it only runs when the `run-ci` label
  # is present. Labels require Triage role or higher to apply, so an
  # external contributor cannot self-trigger a ~30–50 min CI run from a
  # fork. The job-level `if:` enforces the gate; `types: [labeled,
  # synchronize]` re-triggers on label apply and on subsequent pushes
  # to an already-labeled PR. Path filters still apply as a secondary
  # gate so pure-doc commits on a labeled PR don't burn runner time.
  # Push to main and manual `workflow_dispatch` are unaffected.
  pull_request:
    types: [labeled, synchronize]
    branches: [main]
    paths:
      - 'ZiskFv/**'
      - 'tools/pil-extract/**'
      - 'lake-manifest.json'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'trust/**'
      - '.github/workflows/proofs.yml'
  push:
    branches: [main]
    paths:
      - 'ZiskFv/**'
      - 'tools/pil-extract/**'
      - 'lake-manifest.json'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'trust/**'
      - '.github/workflows/proofs.yml'
  workflow_dispatch:

concurrency:
  group: proofs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pick-runner:
    # Pre-flight on a free GitHub-hosted runner: evaluate the pilout
    # derivation's output store path, ask cachix whether it's already
    # cached, and pick a runner size accordingly. The pilout build
    # peaks at ~17 GiB total RSS (pil2-compiler's V8 heap + mmap'd
    # fixed-table pages); only the cold path needs the 32 GiB XL
    # runner. Lake build itself peaks at ~9 GiB system used (run
    # 25371352799), which fits comfortably on the 16 GiB L runner.
    # Net effect: warm PRs (~99% of them) pay the cheaper L runner.
    name: pick runner based on cachix state
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve pilout derivation output hash
        id: eval
        run: |
          set -euo pipefail
          path=$(nix eval --raw .#zisk-pilout.outPath)
          hash=$(basename "$path" | cut -d- -f1)
          echo "path=$path"
          echo "hash=$hash"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Probe zisk-fv.cachix.org for pilout
        id: pick
        run: |
          set -uo pipefail
          hash="${{ steps.eval.outputs.hash }}"
          status=$(curl -sIo /dev/null -w "%{http_code}" \
            "https://zisk-fv.cachix.org/${hash}.narinfo" || echo "000")
          echo "narinfo HTTP $status for $hash"
          if [ "$status" = "200" ]; then
            echo "→ pilout cached; routing to size-l-x64"
            echo "runner=size-l-x64" >> "$GITHUB_OUTPUT"
          else
            echo "→ pilout NOT cached; routing to size-xl-x64 for cold build"
            echo "runner=size-xl-x64" >> "$GITHUB_OUTPUT"
          fi

  lake-build:
    name: lake build (full FV check)
    needs: pick-runner
    # Runner size is chosen at runtime by the pick-runner job above:
    # XL (32 GiB) only when the cold pilout rebuild is needed (its
    # ~17 GiB peak exceeds L), L (16 GiB) otherwise. Lake build
    # itself peaks ~9 GiB system used (run 25371352799), so warm-
    # cachix PRs fit L with 7 GiB headroom. Cold first run: ~30 min
    # nix populate + ~90 min lake build (single-thread perf on the
    # self-hosted runners is much slower than typical dev boxes).
    # Subsequent runs hit the cachix cache for nix outputs and the
    # actions/cache for .lake — finish in ~10 min.
    runs-on: ["self-hosted-ghr", "${{ needs.pick-runner.outputs.runner }}"]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          # zisk/ submodule is a citation surface for transpile_*
          # axiom rationales; the build does not read it.
          submodules: false

      # cachix/install-nix-action (rather than DeterminateSystems') —
      # cachix-action assumes paths set up by this installer; using
      # the DS installer breaks `which cachix` lookup post-install.
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # ----------------------------------------------------------------
      # Cachix binary cache for Nix derivations. After the first run
      # populates the cache (or you `cachix push zisk-fv` locally),
      # subsequent runs pull pre-built `sail-lean-tree` /
      # `zisk-pilout` / `extracted-lean` outputs in seconds instead
      # of the ~30 min cold build. Public read; authenticated push.
      # ----------------------------------------------------------------
      - uses: cachix/cachix-action@v15
        with:
          name: zisk-fv
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # ----------------------------------------------------------------
      # Cache .lake (Mathlib + project build). Mathlib oleans come from
      # mathlib's azure cache via `lake exe cache get`; we persist the
      # full .lake/ across runs to avoid the ~10-minute cold compile.
      # ----------------------------------------------------------------
      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lake-manifest.json', 'lakefile.toml', 'lean-toolchain') }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            lake-${{ hashFiles('lake-manifest.json', 'lakefile.toml', 'lean-toolchain') }}-

      # ----------------------------------------------------------------
      # The actual build. `nix run .#populate` builds the three Nix
      # derivations (sail-lean-tree, zisk-pilout, extracted-lean) in
      # parallel and copies their outputs into build/ + ZiskFv/Extraction/.
      # ----------------------------------------------------------------
      - name: Populate build/ + ZiskFv/Extraction/ from flake
        run: nix run .#populate

      - name: Pull mathlib oleans
        run: nix develop --command bash -c 'lake exe cache get || true'

      - name: nix run .#test (cargo + lake + trust gate + flake check)
        env:
          # threads=3 in CI. The fresh-build mem measurement
          # (2026-05-14) showed 8 GiB peak per `lean` process; 3 workers
          # ≈ 24 GiB peak on the 32 GiB XL runner, leaving safe headroom.
          # Earlier threads=4 (run 25367633312) worked but with less
          # margin; threads=2 was the conservative original default.
          # nix/test.nix's default is matched at 3.
          LEAN_NUM_THREADS: "3"
        run: |
          # Memory + lean-process sidecar. Run 25230110804 died with no
          # step log content preserved → strong signal the runner host
          # itself crashed (probably kernel OOM-kill of the runner agent
          # rather than just lake's lean subprocesses). This sidecar
          # streams to stdout every 10s so GitHub captures real-time
          # samples even if the agent dies later, and persists to a
          # file uploaded as artifact for post-mortem.
          mkdir -p /tmp/proofs-debug
          TRACE=/tmp/proofs-debug/mem-trace.log
          : > "$TRACE"
          (
            while true; do
              ts=$(date -u +%H:%M:%S)
              mem=$(awk '/MemTotal/{t=$2} /MemAvailable/{a=$2} END{printf "tot=%.1fG avail=%.1fG used=%.1fG", t/1048576, a/1048576, (t-a)/1048576}' /proc/meminfo)
              leans=$(pgrep -c '^lean$' || echo 0)
              lean_rss=$(awk '$2 == "lean" {sum += $1} END {printf "%.1fG", sum/1048576}' <(ps -eo rss,comm))
              load=$(awk '{print $1}' /proc/loadavg)
              line="[mem $ts] $mem leans=$leans lean_rss=$lean_rss load=$load"
              echo "$line"
              echo "$line" >> "$TRACE"
              sleep 10
            done
          ) &
          SIDECAR_PID=$!
          trap 'kill $SIDECAR_PID 2>/dev/null || true' EXIT
          echo "::group::env (LEAN_NUM_THREADS visibility)"
          echo "LEAN_NUM_THREADS=$LEAN_NUM_THREADS"
          nproc
          free -m
          echo "::endgroup::"
          set +e
          nix run .#test
          EXIT=$?
          set -e
          kill $SIDECAR_PID 2>/dev/null || true
          echo "::group::dmesg tail (OOM-killer evidence)"
          dmesg | tail -200 || sudo dmesg | tail -200 || echo "dmesg unavailable"
          echo "::endgroup::"
          exit $EXIT

      - name: Upload mem-trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mem-trace
          path: /tmp/proofs-debug/
          if-no-files-found: warn
          retention-days: 7

      - name: On failure — show next-step pointers
        if: failure()
        run: |
          echo "::error::FV check failed. Documentation:"
          echo "  - CLAUDE.md  (working conventions for agents)"
          echo "  - trust/README.md  (overview of the trust gate)"
          echo "  - flake.lock  (the audit surface for build-input changes)"
