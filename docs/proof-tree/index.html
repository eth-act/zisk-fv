<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>zisk-fv proof tree</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0f1115; color: #d8dee9; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
  #status { position: absolute; top: 8px; left: 12px; font-size: 12px; z-index: 10; pointer-events: none; }
  #legend { position: absolute; top: 8px; right: 12px; font-size: 12px; background: rgba(20,22,28,0.85); padding: 8px 10px; border: 1px solid #303540; border-radius: 4px; z-index: 10; }
  #legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  #legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  #controls { position: absolute; bottom: 8px; left: 12px; font-size: 12px; background: rgba(20,22,28,0.85); padding: 6px 10px; border: 1px solid #303540; border-radius: 4px; z-index: 10; }
  #controls button { background: #1c1f26; color: #d8dee9; border: 1px solid #303540; padding: 3px 8px; margin-right: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
  #controls button:hover { background: #2a2f3a; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(15,17,21,0.95); border: 1px solid #4a5060; padding: 4px 6px; border-radius: 3px; font-size: 11px; max-width: 600px; word-break: break-all; z-index: 20; visibility: hidden; color: #aab0bc; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  #info-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1a1a1a;
    color: #e7e9ee;
    padding: 14px 24px;
    font-family: sans-serif;
    font-size: 13px;
    border-top: 1px solid #333;
    z-index: 100;
    min-height: 70px;
    box-sizing: border-box;
  }
  #info-panel .empty { color: #7a8090; font-style: italic; padding-top: 18px; }
  #info-panel .name {
    font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
    font-size: 15px;
    margin-bottom: 8px;
    word-break: break-all;
    color: #ffffff;
  }
  #info-panel .meta { display: flex; flex-wrap: wrap; gap: 18px; color: #b8bcc8; font-size: 12px; }
  #info-panel .meta span { display: inline-block; }
  #info-panel .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #2a2f3a;
    color: #d8dee9;
  }
  #info-panel .badge.root { background: #3a4a30; color: #c8e0a8; }
  #info-panel .badge.axiom { background: #4a2830; color: #f0a8a8; }
  #info-panel .badge.project { background: #28384a; color: #a8c8e8; }
  #info-panel .toast {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    background: #3a4a30;
    color: #c8e0a8;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #info-panel .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="status">loading edges.tsv…</div>
<div id="legend">
  <div class="row"><span class="sw" style="background:#a3be8c"></span>root (uber-theorem)</div>
  <div class="row"><span class="sw" style="background:#88c0d0"></span>project const</div>
  <div class="row"><span class="sw" style="background:#bf616a"></span>axiom (trust leaf)</div>
  <div style="margin-top:6px;font-size:11px;color:#7a8090">layered top-down · scroll to zoom · drag to pan · hover for info</div>
</div>
<div id="controls">
  <button onclick="resetView()">reset view</button>
  <span id="counts" style="color:#7a8090;margin-left:8px"></span>
</div>
<div id="tooltip"></div>
<canvas id="canvas"></canvas>
<div id="info-panel">
  <div class="empty" id="info-empty">Hover a node to inspect · click to copy full name</div>
  <div class="filled" id="info-filled" hidden>
    <div class="name" id="info-name"></div>
    <div class="meta">
      <span class="badge" id="info-kind"></span>
      <span>depth <span id="info-depth"></span></span>
      <span>in-degree <span id="info-in"></span></span>
      <span>out-degree <span id="info-out"></span></span>
    </div>
  </div>
  <div class="toast" id="info-toast">copied!</div>
</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const ROOT = "ZiskFv.Equivalence.Compliance.Global.zisk_riscv_compliant_program_bus";
const LAYER_HEIGHT = 120;
const LAYER_TOP_PAD = 60;

const colorOf = (kind, isRoot) => {
  if (isRoot) return "#a3be8c";        // root green
  if (kind === "A") return "#bf616a";  // axiom red
  return "#88c0d0";                    // project blue
};

const radiusOf = (kind, isRoot, depth) => {
  if (isRoot) return 9;
  if (kind === "A") return 3.5;
  // gradient by depth — deeper nodes get smaller
  return Math.max(2.5, 6 - depth * 0.4);
};

const shortName = (n) => {
  const parts = n.split(".");
  return parts[parts.length - 1];
};

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const tooltip = d3.select("#tooltip");
const status = d3.select("#status");

let width = 0, height = 0;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  // base DPR scale; zoom applies on top via ctx.save/translate/scale
  if (allNodes) draw();
}
window.addEventListener("resize", resize);

let allNodes = null, allLinks = null;
let transform = d3.zoomIdentity;
let hoverNode = null;
let frozenNode = null;  // node pinned in the info panel by a click
let quad = null;
let zoomBehavior = null;
let layoutWidth = 0, layoutHeight = 0;
let inDeg = new Map(), outDeg = new Map();

async function load() {
  const text = await fetch("edges.tsv").then(r => r.text());
  const lines = text.trim().split("\n").slice(1);  // drop header
  const nodeMap = new Map();
  const links = [];
  function ensureNode(name, kind) {
    if (!nodeMap.has(name)) {
      nodeMap.set(name, { id: name, kind, depth: Infinity });
    } else if (kind === "A" && nodeMap.get(name).kind !== "A") {
      // Promote to axiom if we see an A label.
      nodeMap.get(name).kind = "A";
    }
    return nodeMap.get(name);
  }
  for (const line of lines) {
    const [parent, child, pk, ck] = line.split("\t");
    ensureNode(parent, pk);
    ensureNode(child, ck);
    links.push({ source: parent, target: child });
  }
  if (!nodeMap.has(ROOT)) {
    status.text("ERROR: root not found in edges");
    return;
  }
  // BFS depth from root.
  const adj = new Map();
  for (const l of links) {
    if (!adj.has(l.source)) adj.set(l.source, []);
    adj.get(l.source).push(l.target);
  }
  const queue = [ROOT];
  nodeMap.get(ROOT).depth = 0;
  while (queue.length) {
    const cur = queue.shift();
    const d = nodeMap.get(cur).depth;
    for (const t of (adj.get(cur) || [])) {
      const n = nodeMap.get(t);
      if (n && n.depth > d + 1) {
        n.depth = d + 1;
        queue.push(t);
      }
    }
  }
  allNodes = [...nodeMap.values()];
  // Drop nodes unreachable from root (depth still Infinity).
  allNodes = allNodes.filter(n => Number.isFinite(n.depth));
  // Resolve link endpoints to node objects (matching forceLink behaviour the rest of the code expects).
  const byId = new Map(allNodes.map(n => [n.id, n]));
  allLinks = [];
  for (const l of links) {
    const s = byId.get(l.source);
    const t = byId.get(l.target);
    if (s && t) allLinks.push({ source: s, target: t });
  }
  // Precompute static visual props for each node (avoid per-frame recompute).
  for (const n of allNodes) {
    const isRoot = n.id === ROOT;
    n.isRoot = isRoot;
    n.r = radiusOf(n.kind, isRoot, n.depth);
    n.color = colorOf(n.kind, isRoot);
    n.short = shortName(n.id);
  }
  // Precompute in/out degrees once. Sum of outDeg over all nodes equals total edges.
  inDeg = new Map();
  outDeg = new Map();
  for (const e of allLinks) {
    outDeg.set(e.source.id, (outDeg.get(e.source.id) ?? 0) + 1);
    inDeg.set(e.target.id, (inDeg.get(e.target.id) ?? 0) + 1);
  }
  d3.select("#counts").text(`${allNodes.length} nodes · ${allLinks.length} edges`);
  status.text("");
  resize();
  layout();
  initZoom();
  draw();
}

function layout() {
  // Group by depth.
  const byDepth = d3.group(allNodes, d => d.depth);
  const maxDepth = d3.max(allNodes, d => d.depth);
  const widest = d3.max([...byDepth.values()], arr => arr.length) || 1;

  // Choose a logical canvas width that scales with the widest layer so dense
  // rows aren't cramped. Floor at the viewport width; otherwise allocate
  // ~24px per node in the widest layer.
  layoutWidth = Math.max(window.innerWidth, widest * 24);
  layoutHeight = (maxDepth + 1) * LAYER_HEIGHT + LAYER_TOP_PAD;

  // Initial uniform x within each layer; y by depth.
  for (const [depth, layerNodes] of byDepth) {
    const n = layerNodes.length;
    layerNodes.forEach((node, i) => {
      node.y = depth * LAYER_HEIGHT + LAYER_TOP_PAD;
      node.x = (layoutWidth * (i + 1)) / (n + 1);
    });
  }

  // Build incoming-edge adjacency for the barycenter pass.
  const parentsOf = new Map();
  for (const e of allLinks) {
    if (!parentsOf.has(e.target.id)) parentsOf.set(e.target.id, []);
    parentsOf.get(e.target.id).push(e.source);
  }

  // Barycenter heuristic, one top-down pass: order each layer (depth >= 1)
  // by the mean x of its parents, then re-spread evenly.
  for (let depth = 1; depth <= maxDepth; depth++) {
    const layerNodes = byDepth.get(depth) || [];
    if (!layerNodes.length) continue;
    for (const node of layerNodes) {
      const parents = parentsOf.get(node.id) || [];
      node._bary = parents.length ? d3.mean(parents, p => p.x) : node.x;
    }
    layerNodes.sort((a, b) => a._bary - b._bary);
    const n = layerNodes.length;
    layerNodes.forEach((node, i) => {
      node.x = (layoutWidth * (i + 1)) / (n + 1);
    });
  }

  // Build quadtree once — positions are now fixed.
  quad = d3.quadtree(allNodes, d => d.x, d => d.y);
}

function draw() {
  ctx.save();
  ctx.clearRect(0, 0, width, height);
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // Edges — single path batch.
  ctx.beginPath();
  for (const e of allLinks) {
    if (e.source.x == null || e.target.x == null) continue;
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
  }
  ctx.lineWidth = 0.6 / transform.k;
  ctx.strokeStyle = "rgba(58,64,80,0.4)";
  ctx.stroke();

  // Highlight edges if hovering.
  if (hoverNode) {
    ctx.beginPath();
    for (const e of allLinks) {
      if (e.source === hoverNode || e.target === hoverNode) {
        ctx.moveTo(e.source.x, e.source.y);
        ctx.lineTo(e.target.x, e.target.y);
      }
    }
    ctx.lineWidth = 1.5 / transform.k;
    ctx.strokeStyle = "#ebcb8b";
    ctx.stroke();
  }

  // Nodes — group by fill color to minimize state changes.
  // Three buckets: root green, axiom red, project blue.
  const buckets = { "#a3be8c": [], "#bf616a": [], "#88c0d0": [] };
  for (const n of allNodes) {
    if (n.x == null) continue;
    (buckets[n.color] || (buckets[n.color] = [])).push(n);
  }
  for (const color in buckets) {
    const arr = buckets[color];
    if (!arr.length) continue;
    ctx.beginPath();
    for (const n of arr) {
      ctx.moveTo(n.x + n.r, n.y);
      ctx.arc(n.x, n.y, n.r, 0, 2 * Math.PI);
    }
    ctx.fillStyle = color;
    ctx.fill();
    ctx.lineWidth = 0.5 / transform.k;
    ctx.strokeStyle = "#1a1c22";
    ctx.stroke();
  }

  // Hover ring.
  if (hoverNode && hoverNode.x != null) {
    ctx.beginPath();
    ctx.arc(hoverNode.x, hoverNode.y, hoverNode.r + 1.5, 0, 2 * Math.PI);
    ctx.lineWidth = 2 / transform.k;
    ctx.strokeStyle = "#ebcb8b";
    ctx.stroke();
  }

  // Node labels are no longer drawn on the canvas — see the bottom info panel.
  ctx.restore();
}

function kindLabel(node) {
  if (node.isRoot) return "root";
  if (node.kind === "A") return "axiom";
  return "project";
}

function updateInfoPanel(node) {
  const empty = document.getElementById("info-empty");
  const filled = document.getElementById("info-filled");
  if (!node) {
    filled.hidden = true;
    empty.hidden = false;
    return;
  }
  empty.hidden = true;
  filled.hidden = false;
  document.getElementById("info-name").textContent = node.id;
  const kind = kindLabel(node);
  const kindEl = document.getElementById("info-kind");
  kindEl.textContent = kind;
  kindEl.className = "badge " + kind;
  document.getElementById("info-depth").textContent = node.depth;
  document.getElementById("info-in").textContent = inDeg.get(node.id) ?? 0;
  document.getElementById("info-out").textContent = outDeg.get(node.id) ?? 0;
}

let toastTimer = null;
function flashToast(msg) {
  const t = document.getElementById("info-toast");
  t.textContent = msg;
  t.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1200);
}

function initialTransform() {
  // Fit the layout to the viewport: scale so the full width fits, with a bit
  // of margin, and center the layout horizontally / pin it near the top.
  const margin = 40;
  const kx = (width - 2 * margin) / layoutWidth;
  const ky = (height - 2 * margin) / layoutHeight;
  const k = Math.min(kx, ky, 1);
  const tx = (width - layoutWidth * k) / 2;
  const ty = margin;
  return d3.zoomIdentity.translate(tx, ty).scale(k);
}

function initZoom() {
  zoomBehavior = d3.zoom()
    .scaleExtent([0.02, 8])
    .on("zoom", (event) => {
      transform = event.transform;
      draw();
    });
  d3.select(canvas).call(zoomBehavior);
  // Apply the fit-to-view transform so users see the whole tree on load.
  d3.select(canvas).call(zoomBehavior.transform, initialTransform());

  canvas.addEventListener("mousemove", (evt) => {
    const rect = canvas.getBoundingClientRect();
    const x = (evt.clientX - rect.left - transform.x) / transform.k;
    const y = (evt.clientY - rect.top - transform.y) / transform.k;
    if (!quad) return;
    // Search radius in data space: ~20px on screen, plus node radius slack.
    const searchR = 20 / transform.k;
    const hit = quad.find(x, y, searchR);
    if (hit !== hoverNode) {
      hoverNode = hit || null;
      draw();
    }
    // Info panel updates live on hover unless a node is frozen via click.
    if (!frozenNode) updateInfoPanel(hoverNode);
    if (hoverNode) {
      tooltip.style("visibility", "visible")
        .style("left", (evt.clientX + 12) + "px")
        .style("top", (evt.clientY + 12) + "px")
        .text(hoverNode.short);
    } else {
      tooltip.style("visibility", "hidden");
    }
  });

  canvas.addEventListener("mouseleave", () => {
    if (hoverNode) { hoverNode = null; draw(); }
    tooltip.style("visibility", "hidden");
    if (!frozenNode) updateInfoPanel(null);
  });

  canvas.addEventListener("click", (evt) => {
    const rect = canvas.getBoundingClientRect();
    const x = (evt.clientX - rect.left - transform.x) / transform.k;
    const y = (evt.clientY - rect.top - transform.y) / transform.k;
    if (!quad) return;
    const hit = quad.find(x, y, 20 / transform.k);
    if (hit) {
      frozenNode = hit;
      updateInfoPanel(hit);
      navigator.clipboard?.writeText(hit.id).then(
        () => flashToast("copied!"),
        () => flashToast("copy failed")
      );
    } else {
      // Click on empty space unfreezes.
      if (frozenNode) {
        frozenNode = null;
        updateInfoPanel(hoverNode);
      }
    }
  });
}

function resetView() {
  d3.select(canvas).transition().duration(500).call(zoomBehavior.transform, initialTransform());
}

load();
</script>
</body>
</html>
