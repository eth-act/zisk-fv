<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>zisk-fv proof tree</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0f1115; color: #d8dee9; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
  #status { position: absolute; top: 8px; left: 12px; font-size: 12px; z-index: 10; pointer-events: none; }
  #legend { position: absolute; top: 8px; right: 12px; font-size: 12px; background: rgba(20,22,28,0.85); padding: 8px 10px; border: 1px solid #303540; border-radius: 4px; z-index: 10; }
  #legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  #legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  #controls { position: absolute; bottom: 8px; left: 12px; font-size: 12px; background: rgba(20,22,28,0.85); padding: 6px 10px; border: 1px solid #303540; border-radius: 4px; z-index: 10; }
  #controls button { background: #1c1f26; color: #d8dee9; border: 1px solid #303540; padding: 3px 8px; margin-right: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
  #controls button:hover { background: #2a2f3a; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(15,17,21,0.95); border: 1px solid #4a5060; padding: 6px 8px; border-radius: 4px; font-size: 12px; max-width: 600px; word-break: break-all; z-index: 20; visibility: hidden; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
</style>
</head>
<body>
<div id="status">loading edges.tsv…</div>
<div id="legend">
  <div class="row"><span class="sw" style="background:#a3be8c"></span>root (uber-theorem)</div>
  <div class="row"><span class="sw" style="background:#88c0d0"></span>project const</div>
  <div class="row"><span class="sw" style="background:#bf616a"></span>axiom (trust leaf)</div>
  <div style="margin-top:6px;font-size:11px;color:#7a8090">scroll to zoom · drag to pan · hover/click node</div>
</div>
<div id="controls">
  <button onclick="resetView()">reset view</button>
  <button onclick="toggleLabels()">toggle labels</button>
  <button onclick="restartSim()">re-layout</button>
  <span id="counts" style="color:#7a8090;margin-left:8px"></span>
</div>
<div id="tooltip"></div>
<canvas id="canvas"></canvas>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const ROOT = "ZiskFv.Equivalence.Compliance.Global.zisk_riscv_compliant_program_bus";

const colorOf = (kind, isRoot) => {
  if (isRoot) return "#a3be8c";        // root green
  if (kind === "A") return "#bf616a";  // axiom red
  return "#88c0d0";                    // project blue
};

const radiusOf = (kind, isRoot, depth) => {
  if (isRoot) return 9;
  if (kind === "A") return 3.5;
  // gradient by depth — deeper nodes get smaller
  return Math.max(2.5, 6 - depth * 0.4);
};

const shortName = (n) => {
  const parts = n.split(".");
  return parts[parts.length - 1];
};

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const tooltip = d3.select("#tooltip");
const status = d3.select("#status");

let width = 0, height = 0;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  // base DPR scale; zoom applies on top via ctx.save/translate/scale
  if (allNodes) draw();
}
window.addEventListener("resize", resize);

let allNodes = null, allLinks = null;
let simulation = null;
let transform = d3.zoomIdentity;
let showLabels = false;
let hoverNode = null;
let quad = null;
let zoomBehavior = null;

async function load() {
  const text = await fetch("edges.tsv").then(r => r.text());
  const lines = text.trim().split("\n").slice(1);  // drop header
  const nodeMap = new Map();
  const links = [];
  function ensureNode(name, kind) {
    if (!nodeMap.has(name)) {
      nodeMap.set(name, { id: name, kind, depth: Infinity });
    } else if (kind === "A" && nodeMap.get(name).kind !== "A") {
      // Promote to axiom if we see an A label.
      nodeMap.get(name).kind = "A";
    }
    return nodeMap.get(name);
  }
  for (const line of lines) {
    const [parent, child, pk, ck] = line.split("\t");
    ensureNode(parent, pk);
    ensureNode(child, ck);
    links.push({ source: parent, target: child });
  }
  if (!nodeMap.has(ROOT)) {
    status.text("ERROR: root not found in edges");
    return;
  }
  // BFS depth from root.
  const adj = new Map();
  for (const l of links) {
    if (!adj.has(l.source)) adj.set(l.source, []);
    adj.get(l.source).push(l.target);
  }
  const queue = [ROOT];
  nodeMap.get(ROOT).depth = 0;
  while (queue.length) {
    const cur = queue.shift();
    const d = nodeMap.get(cur).depth;
    for (const t of (adj.get(cur) || [])) {
      const n = nodeMap.get(t);
      if (n && n.depth > d + 1) {
        n.depth = d + 1;
        queue.push(t);
      }
    }
  }
  allNodes = [...nodeMap.values()];
  allLinks = links;
  // Precompute static visual props for each node (avoid per-frame recompute).
  for (const n of allNodes) {
    const isRoot = n.id === ROOT;
    n.isRoot = isRoot;
    n.r = radiusOf(n.kind, isRoot, n.depth);
    n.color = colorOf(n.kind, isRoot);
    n.short = shortName(n.id);
    n.priority = isRoot || n.kind === "A";  // always-label set
  }
  d3.select("#counts").text(`${allNodes.length} nodes · ${allLinks.length} edges`);
  status.text("");
  resize();
  initSim();
  initZoom();
}

function initSim() {
  simulation = d3.forceSimulation(allNodes)
    .force("link", d3.forceLink(allLinks).id(d => d.id).distance(20).strength(0.4))
    .force("charge", d3.forceManyBody().strength(-30).distanceMax(400))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide().radius(d => d.r + 2))
    .force("radial", d3.forceRadial(d => 80 + d.depth * 60, width / 2, height / 2).strength(0.15))
    .on("tick", onTick);
}

function onTick() {
  // Rebuild quadtree each tick for accurate hit-testing.
  quad = d3.quadtree(allNodes, d => d.x, d => d.y);
  draw();
}

function draw() {
  ctx.save();
  ctx.clearRect(0, 0, width, height);
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // Edges — single path batch.
  ctx.beginPath();
  for (const e of allLinks) {
    if (e.source.x == null || e.target.x == null) continue;
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
  }
  ctx.lineWidth = 0.6 / transform.k;
  ctx.strokeStyle = "rgba(58,64,80,0.4)";
  ctx.stroke();

  // Highlight edges if hovering.
  if (hoverNode) {
    ctx.beginPath();
    for (const e of allLinks) {
      if (e.source === hoverNode || e.target === hoverNode) {
        ctx.moveTo(e.source.x, e.source.y);
        ctx.lineTo(e.target.x, e.target.y);
      }
    }
    ctx.lineWidth = 1.5 / transform.k;
    ctx.strokeStyle = "#ebcb8b";
    ctx.stroke();
  }

  // Nodes — group by fill color to minimize state changes.
  // Three buckets: root green, axiom red, project blue.
  const buckets = { "#a3be8c": [], "#bf616a": [], "#88c0d0": [] };
  for (const n of allNodes) {
    if (n.x == null) continue;
    (buckets[n.color] || (buckets[n.color] = [])).push(n);
  }
  for (const color in buckets) {
    const arr = buckets[color];
    if (!arr.length) continue;
    ctx.beginPath();
    for (const n of arr) {
      ctx.moveTo(n.x + n.r, n.y);
      ctx.arc(n.x, n.y, n.r, 0, 2 * Math.PI);
    }
    ctx.fillStyle = color;
    ctx.fill();
    ctx.lineWidth = 0.5 / transform.k;
    ctx.strokeStyle = "#1a1c22";
    ctx.stroke();
  }

  // Hover ring.
  if (hoverNode && hoverNode.x != null) {
    ctx.beginPath();
    ctx.arc(hoverNode.x, hoverNode.y, hoverNode.r + 1.5, 0, 2 * Math.PI);
    ctx.lineWidth = 2 / transform.k;
    ctx.strokeStyle = "#ebcb8b";
    ctx.stroke();
  }

  // Labels: always-on for root + axioms; everything else only when zoomed enough or toggle is on.
  // Scale label font so text stays roughly fixed size on screen.
  const labelPx = 9;
  ctx.font = (labelPx / transform.k) + "px system-ui, sans-serif";
  ctx.fillStyle = "#aab0bc";
  ctx.textBaseline = "middle";
  const showAll = showLabels || transform.k >= 0.5;
  for (const n of allNodes) {
    if (n.x == null) continue;
    if (!showAll && !n.priority) continue;
    ctx.fillText(n.short, n.x + n.r + 2 / transform.k, n.y);
  }

  ctx.restore();
}

function initZoom() {
  zoomBehavior = d3.zoom()
    .scaleExtent([0.05, 8])
    .on("zoom", (event) => {
      transform = event.transform;
      draw();
    });
  d3.select(canvas).call(zoomBehavior);

  canvas.addEventListener("mousemove", (evt) => {
    const rect = canvas.getBoundingClientRect();
    const x = (evt.clientX - rect.left - transform.x) / transform.k;
    const y = (evt.clientY - rect.top - transform.y) / transform.k;
    if (!quad) return;
    // Search radius in data space: ~20px on screen, plus node radius slack.
    const searchR = 20 / transform.k;
    const hit = quad.find(x, y, searchR);
    if (hit !== hoverNode) {
      hoverNode = hit || null;
      draw();
    }
    if (hoverNode) {
      tooltip.style("visibility", "visible")
        .style("left", (evt.clientX + 12) + "px")
        .style("top", (evt.clientY + 12) + "px")
        .html(
          `<b>${escapeHtml(hoverNode.short)}</b><br>` +
          `<span style="color:#888">${escapeHtml(hoverNode.id)}</span><br>` +
          `<span style="color:#888">kind: ${hoverNode.kind === "A" ? "axiom" : "project"} · depth: ${hoverNode.depth}</span>`
        );
    } else {
      tooltip.style("visibility", "hidden");
    }
  });

  canvas.addEventListener("mouseleave", () => {
    if (hoverNode) { hoverNode = null; draw(); }
    tooltip.style("visibility", "hidden");
  });

  canvas.addEventListener("click", (evt) => {
    const rect = canvas.getBoundingClientRect();
    const x = (evt.clientX - rect.left - transform.x) / transform.k;
    const y = (evt.clientY - rect.top - transform.y) / transform.k;
    if (!quad) return;
    const hit = quad.find(x, y, 20 / transform.k);
    if (hit) {
      console.log(hit.id);
      navigator.clipboard?.writeText(hit.id);
    }
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function resetView() {
  d3.select(canvas).transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
}

function toggleLabels() {
  showLabels = !showLabels;
  draw();
}

function restartSim() {
  if (simulation) simulation.alpha(1).restart();
}

load();
</script>
</body>
</html>
